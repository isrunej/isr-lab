---
layout: default
---

<article>
  <div class="post-wrap">
    <a href="{{ '/news/' | relative_url }}" class="post-back">← Kembali ke Berita</a>

    <p class="post-cat">{{ page.category | default: "News" | upcase }}</p>
    <h1 class="post-title">{{ page.title }}</h1>

    <div class="post-meta">
      <span class="post-meta-item">📅 {{ page.date | date: "%d %B %Y" }}</span>
      {% if page.author %}
      <span class="post-meta-item">✍️ {{ page.author }}</span>
      {% endif %}
      {% if page.tags %}
      <span class="post-meta-item">
        {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
        {% endfor %}
      </span>
      {% endif %}
    </div>

    <div class="post-content">
      {{ content }}
    </div>
  </div>
</article>
